<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Exclusivo</title>

  <!-- TikTok Pixel Code Start -->

  <style>
    /* ---------- RESET & BASE ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-deep:    #0a1628;
      --blue-mid:     #0d2044;
      --blue-soft:    #1a3a6e;
      --blue-accent:  #2563b0;
      --blue-glow:    #3b82f6;
      --blue-light:   #93c5fd;
      --white:        #f0f6ff;
      --grey:         #8eaacf;
      --check-green:  #22c55e;
      --radius:       14px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background-color: var(--blue-deep);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%,   #1a3a6e55 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%,  #0d204455 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 90%,  #2563b022 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* ---------- CARD ---------- */
    .card {
      background: linear-gradient(160deg, #0d2044cc 0%, #0a1628dd 100%);
      border: 1px solid #2563b044;
      border-radius: 24px;
      padding: 52px 44px 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 60px #2563b018,
        0 24px 60px #00000060,
        inset 0 1px 0 #3b82f622;
      backdrop-filter: blur(8px);
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- ÍCONE ---------- */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a6e, #0d2044);
      border: 1.5px solid #3b82f640;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 0 24px #3b82f620;
    }

    .icon-wrap svg {
      width: 34px;
      height: 34px;
      fill: var(--blue-glow);
      opacity: .85;
    }

    /* ---------- TEXTO ---------- */
    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -.01em;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: .9rem;
      color: var(--grey);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* ---------- CHECKBOX BUTTON ---------- */
    .verify-box {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #0a162899;
      border: 1.5px solid #2563b055;
      border-radius: var(--radius);
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
      position: relative;
      overflow: hidden;
    }

    .verify-box:hover {
      border-color: #3b82f670;
      box-shadow: 0 0 18px #3b82f615;
    }

    .verify-box.loading,
    .verify-box.done { cursor: default; pointer-events: none; }

    /* caixa do "checkbox" */
    .chk {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 2px solid #2563b0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .2s, background .2s;
      position: relative;
    }

    .chk svg { opacity: 0; transform: scale(.5); transition: opacity .2s, transform .2s; }

    .verify-box.done .chk {
      background: var(--check-green);
      border-color: var(--check-green);
    }
    .verify-box.done .chk svg { opacity: 1; transform: scale(1); }

    /* texto dentro */
    .chk-label {
      flex: 1;
      text-align: left;
    }
    .chk-label span {
      display: block;
      font-size: .95rem;
      font-weight: 600;
      color: var(--white);
    }
    .chk-label small {
      font-size: .72rem;
      color: var(--grey);
    }

    /* badge direita */
    .badge {
      font-size: .68rem;
      color: var(--grey);
      line-height: 1.3;
      text-align: right;
      flex-shrink: 0;
    }

    /* ---------- SPINNER ---------- */
    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid #2563b040;
      border-top-color: var(--blue-glow);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .verify-box.loading .spinner { display: block; }
    .verify-box.loading .chk     { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- PROGRESSO ---------- */
    .progress-wrap {
      height: 3px;
      background: #1a3a6e55;
      border-radius: 99px;
      margin-top: 22px;
      overflow: hidden;
      opacity: 0;
      transition: opacity .3s;
    }
    .progress-wrap.visible { opacity: 1; }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue-accent), var(--blue-glow));
      border-radius: 99px;
      transition: width .1s linear;
    }

    /* ---------- STATUS ---------- */
    .status {
      margin-top: 14px;
      font-size: .8rem;
      color: var(--grey);
      min-height: 18px;
      transition: color .3s;
    }
    .status.ok { color: var(--check-green); }

    /* ---------- BOTÃO TELEGRAM ---------- */
    .tg-btn {
      display: none;
      margin-top: 28px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2563b0, #1d4ed8);
      border: none;
      border-radius: var(--radius);
      color: var(--white);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 4px 24px #2563b044;
      transition: transform .15s, box-shadow .15s;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .tg-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px #2563b066; }
    .tg-btn:active { transform: translateY(0); }
    .tg-btn.visible { display: flex; align-items: center; justify-content: center; gap: 10px; }

    .tg-btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

    /* ---------- RODAPÉ ---------- */
    .footer-note {
      margin-top: 32px;
      font-size: .7rem;
      color: #2563b088;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Ícone -->
  <div class="icon-wrap">
    <!-- Ícone de escudo/verificação -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1zm-1 14l-3-3 1.41-1.41L11 12.17l4.59-4.58L17 9l-6 6z"/>
    </svg>
  </div>

  <h1>Verificação de Acesso</h1>
  <p class="subtitle">Confirme que você não é um robô<br>para acessar o conteúdo exclusivo.</p>

  <!-- Caixa "Não sou um robô" -->
  <div class="verify-box" id="verifyBox" onclick="startVerify()">
    <div class="spinner" id="spinner"></div>
    <div class="chk" id="chk">
      <!-- Ícone de check -->
      <svg viewBox="0 0 24 24" width="14" height="14" fill="#fff">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
      </svg>
    </div>
    <div class="chk-label">
      <span>Não sou um robô</span>
      <small id="labelSmall">Clique para confirmar</small>
    </div>
    <div class="badge" id="badge">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg"
           width="32" alt="reCAPTCHA" style="opacity:.35; display:block; margin:0 auto 2px;">
      <span style="display:block">reCAPTCHA</span>
      <span style="display:block">Privacidade · Termos</span>
    </div>
  </div>

  <!-- Barra de progresso -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Status text -->
  <div class="status" id="statusText"></div>

  <!-- Botão Telegram (aparece após verificação) -->
  <a id="tgBtn" class="tg-btn" href="https://t.me/mineira73_bot?start=iniciar" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.372 0 0 5.373 0 12s5.372 12 12 12 12-5.373 12-12S18.628 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 13.667l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.46c.537-.194 1.006.131.978.891z"/>
    </svg>
    Acessar Agora
  </a>

  <p class="footer-note">🔒 Acesso protegido &amp; seguro</p>
</div>

<script>
  let verified = false;

  function startVerify() {
    if (verified) return;

    const box      = document.getElementById('verifyBox');
    const spinner  = document.getElementById('spinner');
    const chk      = document.getElementById('chk');
    const label    = document.getElementById('labelSmall');
    const pw       = document.getElementById('progressWrap');
    const pb       = document.getElementById('progressBar');
    const st       = document.getElementById('statusText');
    const tgBtn    = document.getElementById('tgBtn');

    // — Estado: carregando —
    box.classList.add('loading');
    pw.classList.add('visible');
    st.textContent = 'Verificando...';

    // Duração total: ~3 segundos
    const totalMs = 3200;
    const steps   = [
      { pct: 20,  delay: 400,  msg: 'Verificando navegador...' },
      { pct: 50,  delay: 900,  msg: 'Analisando comportamento...' },
      { pct: 80,  delay: 2000, msg: 'Quase lá...' },
      { pct: 100, delay: totalMs, msg: '' },
    ];

    steps.forEach(s => {
      setTimeout(() => {
        pb.style.width = s.pct + '%';
        if (s.msg) st.textContent = s.msg;
      }, s.delay);
    });

    /* Evento 2: ViewContent — rastreado quando clica em verificar (ainda na sua página) */
    if (typeof ttq !== 'undefined') {
      ttq.track('ViewContent');
    }

    // — Finalização —
    setTimeout(() => {
      verified = true;
      box.classList.remove('loading');
      box.classList.add('done');
      label.textContent = 'Verificado com sucesso';
      st.textContent    = '✓ Confirmado!';
      st.classList.add('ok');

      /* Evento 3: Lead — rastreado na conclusão da verificação (ainda na sua página).
         Este é o último evento rastreável antes do redirecionamento para o Telegram. */
      if (typeof ttq !== 'undefined') {
        ttq.track('Lead');
      }

      // Mostra botão do Telegram
      tgBtn.classList.add('visible');

      // Redireciona automaticamente após mais 1.2s
      setTimeout(() => {
        window.open('https://t.me/mineira73_bot?start=iniciar', '_blank');
      }, 1200);

    }, totalMs);
  }
</script>

</body>
</html>
